spring.application.name=cinema 

# DB Connection
spring.datasource.url=jdbc:mysql://localhost:3306/cinema
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=your_super_secret_key_must_be_at_least_32_characters_long
jwt.expiration=86400000
# 86400000ms = 24 hours

logging.level.org.springframework=INFO
logging.level.com.project.cinema=DEBUG

# Show all endpoints including ones needing auth
springdoc.show-actuator=false
